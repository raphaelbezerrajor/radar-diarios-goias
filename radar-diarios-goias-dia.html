<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");
    const target = data
      ? "pauteiro.html?view=day&data=" + encodeURIComponent(data)
      : "pauteiro.html?view=day";
    window.location.replace(target);
  </script>
  <title>Redirecionando...</title>
</head>
<body>
  <p>Redirecionando para a pagina diaria...</p>
</body>
</html>
